<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
<script defer src="main.js"></script></head>
<body>
    <header>Your Agenda</header>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Projects</h2>
            <button id="addProject" title="Add Project" command="show-modal" commandfor="newProject"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg></button>
        </div>
        <div class="sidebar-projects"></div>
    </div>
    <div class="notecontainer">
        <div class="note-header">
            <h2>Notes</h2>
            <button id="addNote" title="Add Note" command="show-modal" commandfor="newNote"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg></button>
        </div>
        <div class="notes"></div>
    </div>
    <dialog id="newNote">
        <form id="noteForm" method="dialog">
            <div id="noteTitle">
                <label for="title">Title: </label>
                <input type="text" id="title" name="title" required>
            </div>
            <div id="noteDescription">
                <label for="description">Description: </label>
                <textarea name="description" id="description"></textarea>
            </div>
            <div id="noteDate">
                <label for="dueDate">Date:</label>
                <input type="date" name="dueDate" id="dueDate">
            </div>
            <div class="formButtons">
                <button type="button" id="closeNote">Cancel</button>
                <button type="submit" id="submitNote">Submit</button>
            </div>
        </form>
    </dialog>
    <dialog id="newProject">
        <form id="projectForm" method="dialog">
            <div id="projectName">
                <label for="projectTitle">Project Name: </label>
                <input type="text" name="projectTitle" id="projectTitle">
            </div>
            <div class="formButtons">
                <button type="button" id="closeProject">Cancel</button>
                <button type="submit" id="submitProject">Submit</button>
            </div>
        </form>
    </dialog>
</body>
</html>
